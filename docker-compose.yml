version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: helperhub-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webtimviec
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: WebTimViec.Api/Dockerfile
    container_name: helperhub-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5281:5281"
    env_file:
      - WebTimViec.Api/.env # Ensure user copies .env from .env.example
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=webtimviec;Username=postgres;Password=password
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - .:/app

  frontend:
    build:
      context: WebTimViec.Web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5281/api
        - VITE_BASE_URL=http://localhost:5281
    container_name: helperhub-frontend
    ports:
      - "15173:80" # Avoid conflict with local dev port
    depends_on:
      - api

  ngrok:
    image: ngrok/ngrok:latest
    container_name: helperhub-ngrok
    restart: always
    environment:
      - NGROK_AUTHTOKEN=31VkjzPhU5XFoPZ2snnde4XvIMd_2bsCFgSiUZ7Ecjn6qV6yZ
    command:
      - "http"
      - "--domain=joint-honest-lark.ngrok-free.app"
      - "frontend:80"
    depends_on:
      - frontend

volumes:
  postgres_data:
